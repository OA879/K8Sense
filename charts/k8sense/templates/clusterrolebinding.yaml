{{- if .Values.clusterRoleBinding.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8sense.fullname" . }}-admin
  labels:
    {{- include "k8sense.labels" . | nindent 4 }}
  {{- with .Values.clusterRoleBinding.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.clusterRoleBinding.clusterRoleName }}
subjects:
- kind: ServiceAccount
  name: {{ include "k8sense.serviceAccountName" . }}
  namespace: {{ include "k8sense.namespace" . }}
{{- end }}
