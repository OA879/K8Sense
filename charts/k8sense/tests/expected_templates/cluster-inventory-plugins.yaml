# Source: k8sense/templates/deployment.yaml
# This block of code is used to extract the values from the env.
# This is done to check if the values are non-empty and if they are, they are used in the deployment.yaml.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sense
  namespace: default
  labels:
    helm.sh/chart: k8sense-0.43.0
    app.kubernetes.io/name: k8sense
    app.kubernetes.io/instance: k8sense
    app.kubernetes.io/version: "0.43.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sense
      app.kubernetes.io/instance: k8sense
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sense
        app.kubernetes.io/instance: k8sense
    spec:
      serviceAccountName: k8sense
      automountServiceAccountToken: true
      hostUsers: true
      securityContext:
        {}
      containers:
        - name: k8sense
          securityContext:
            privileged: false
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 100
          image: "ghcr.io/k8sense-k8s/k8sense:v0.43.0"
          imagePullPolicy: IfNotPresent
          
          env:
          args:
            - "-in-cluster"
            - "-in-cluster-context-name=main"
            - "-plugins-dir=/k8sense/plugins"
            - "-session-ttl=86400"
            - "-enable-cluster-inventory"
            - "-cluster-inventory-provider-file=/etc/cluster-inventory/config.json"
            - "-cluster-inventory-label-selector=!k8sense.dev/ignore"
            # Check if externalSecret is disabled
          ports:
            - name: http
              containerPort: 4466
              protocol: TCP
          livenessProbe:
            httpGet:
              path: "/"
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: "/"
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          resources:
            {}
          volumeMounts:
            - name: cluster-inventory-config
              mountPath: /etc/cluster-inventory
              readOnly: true
            - name: secretreader
              mountPath: /access-plugins/secretreader
              readOnly: true
            - name: kubeconfig-secretreader
              mountPath: /access-plugins/kubeconfig-secretreader
              readOnly: true
      volumes:
        - name: cluster-inventory-config
          configMap:
            name: k8sense-cluster-inventory
            items:
              - key: config.json
                path: config.json
        - name: secretreader
          image:
            reference: "registry.k8s.io/cluster-inventory-api/secretreader:v0.1.3@sha256:ec3090dc166aa2b42fb35d714d161c417d8b27bbc463404c8f615f5f4c610a1d"
        - name: kubeconfig-secretreader
          image:
            reference: "registry.k8s.io/cluster-inventory-api/kubeconfig-secretreader:v0.1.3@sha256:b92966cc6e4ac78002a63862921022a71d54956826f6e4febcb7247495eb98c0"
