# Source: k8sense/templates/deployment.yaml
# This block of code is used to extract the values from the env.
# This is done to check if the values are non-empty and if they are, they are used in the deployment.yaml.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sense
  namespace: default
  labels:
    helm.sh/chart: k8sense-0.43.0
    app.kubernetes.io/name: k8sense
    app.kubernetes.io/instance: k8sense
    app.kubernetes.io/version: "0.43.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sense
      app.kubernetes.io/instance: k8sense
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sense
        app.kubernetes.io/instance: k8sense
    spec:
      serviceAccountName: k8sense
      automountServiceAccountToken: true
      hostUsers: true
      securityContext:
        {}
      containers:
        - name: k8sense
          securityContext:
            privileged: false
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 100
          image: "ghcr.io/k8sense-k8s/k8sense:v0.43.0"
          imagePullPolicy: IfNotPresent
          
          env:
          args:
            - "-in-cluster"
            - "-in-cluster-context-name=main"
            - "-plugins-dir=/k8sense/plugins"
            - "-session-ttl=86400"
            - "-unsafe-use-service-account-token"
            # Check if externalSecret is disabled
          ports:
            - name: http
              containerPort: 4466
              protocol: TCP
          livenessProbe:
            httpGet:
              path: "/"
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: "/"
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          resources:
            {}
